id: cold_rain_secret
name: "听雨残谱"
type: sword
desc: "青衣客留下的残谱。纸很薄，字更少，每个字都像刀口。"
foundation: basic_sword
requires:
  - art: basic_sword
    level: 1
max_level: 20
attack_moves:
  - id: cold_rain_cut
    name: "雨后一刀"
    desc: "雨声停处，刀声才起。"
    msg: "在雨声一断时出刀"
    unlock_level: 1
    damage: 14
  - id: shadow_spine
    name: "影里一刺"
    desc: "影子先动，人后动。"
    msg: "从影子里递出一刺"
    unlock_level: 3
    damage: 16
active_skills:
  - id: lamp_cut
    name: "灯下一刀"
    desc: "灯亮时出刀，灯灭时收刀。"
    msg: "借灯火一闪，递出一刀"
    unlock_level: 1
    cd: 6.0
    target: Single
    cost: 35
    ap_req: 65
    req_status: []
    damage: 45
    effect:
      self: []
      target: []

  - id: rain_listening_stance
    name: "听雨势"
    desc: "先听雨，再听风，最后听杀意。"
    msg: "微微侧身，像在听雨里的刀声"
    unlock_level: 2
    cd: 18.0
    target: Self
    cost: 35
    ap_req: 45
    req_status: []
    effect:
      self:
        - id: dragon_stance
          duration: 15.0
          value: 1
      target: []

  - id: umbrella_spine_eight
    name: "伞骨八刺"
    desc: "须先入听雨势。出手时，影子比人更快。"
    msg: "身影一折，八点寒光从雨里同时刺出"
    unlock_level: 5
    cd: 20.0
    target: Single
    cost: 80
    ap_req: 100
    req_status:
      - dragon_stance
    damage: 120
    effect:
      self: []
      target: []
